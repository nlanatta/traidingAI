  # LIVE TRADING TESTING - dry_run mode with real API keys
  # Using ImprovedAdaptiveV3: ADX filter + regime detection + 100% win rate in backtest
  freqtrade-live:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: freqtrade-live
    env_file:
      - .env.live
    volumes:
      - "./freqtrade/user_data:/freqtrade/user_data"
      - "./strategies:/freqtrade/strategies:ro"
      - "./config-live.json:/freqtrade/config.json:ro"
    ports:
      - "127.0.0.1:8082:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-live.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-live.sqlite
      --config /freqtrade/config.json
      --strategy ImprovedAdaptiveV3
