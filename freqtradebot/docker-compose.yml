---
services:
  # Original SampleStrategy (baseline)
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: freqtrade
    volumes:
      - "./freqtrade/user_data:/freqtrade/user_data"
      - "./strategies:/freqtrade/strategies:ro"
      - "./config-sample.json:/freqtrade/config.json:ro"
    ports:
      - "127.0.0.1:8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/config.json
      --strategy SampleStrategy

  # CustomSampleStrategy with ADX filter (test)
  freqtrade-custom:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: freqtrade-custom
    volumes:
      - "./freqtrade/user_data:/freqtrade/user_data"
      - "./strategies:/freqtrade/strategies:ro"
      - "./config-custom.json:/freqtrade/config.json:ro"
    ports:
      - "127.0.0.1:8081:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-custom.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-custom.sqlite
      --config /freqtrade/config.json
      --strategy CustomSampleStrategy

